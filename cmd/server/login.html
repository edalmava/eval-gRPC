<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - Login Admin</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); width: 100%; max-width: 350px; text-align: center; }
        h1 { color: #1a73e8; margin-bottom: 1.5rem; font-size: 1.8rem; }
        input { width: 100%; padding: 0.8rem; margin: 0.6rem 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        button { width: 100%; padding: 0.9rem; background: #1a73e8; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; margin-top: 1rem; transition: background 0.3s; }
        button:hover { background: #1557b0; }
        .error { color: #d93025; font-size: 0.85rem; margin-top: 1rem; display: none; }
        .info { font-size: 0.8rem; color: #666; margin-top: 1.5rem; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>SIA Admin</h1>
        <form id="loginForm">
            <input type="text" id="username" placeholder="Usuario" required>
            <input type="password" id="password" placeholder="Contraseña" required>
            <button type="submit">ENTRAR AL PANEL</button>
            <p id="errorMessage" class="error">Credenciales incorrectas</p>
        </form>
        <p class="info">La contraseña es el código de la sala.</p>
    </div>

    <script>
        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('errorMessage');

            const res = await fetch('/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ user, pass })
            });

            if (res.ok) {
                window.location.href = '/';
            } else {
                error.style.display = 'block';
            }
        };
    </script>
</body>
</html>
