<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIA - Panel Profesor</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #1a73e8;
            --blue-dark: #1557b0;
            --green: #1e8e3e;
            --green-bg: #e6f4ea;
            --red: #d93025;
            --red-bg: #fce8e6;
            --orange: #e37400;
            --surface: #fff;
            --bg: #f0f2f5;
            --text: #202124;
            --text-muted: #5f6368;
            --border: #dadce0;
            --radius: 12px;
            --shadow: 0 2px 12px rgba(0,0,0,0.08);
        }

        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

        /* === LAYOUT === */
        .top-bar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0 24px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky; top: 0; z-index: 100;
        }
        .top-bar h1 { font-size: 1.1rem; font-weight: 600; color: var(--blue); }
        .room-badge {
            background: #e8f0fe;
            color: var(--blue);
            padding: 6px 16px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 2px;
        }
        .ws-dot {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--red); display: inline-block; margin-right: 6px;
            transition: background 0.3s;
        }
        .ws-dot.connected { background: var(--green); }

        .main { display: grid; grid-template-columns: 1fr 320px; gap: 20px; padding: 20px 24px; max-width: 1300px; margin: 0 auto; }

        /* === CARDS === */
        .card {
            background: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px;
        }
        .card-title { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 16px; }

        /* === QUESTION BUILDER === */
        .q-builder textarea {
            width: 100%; padding: 12px; border: 1.5px solid var(--border); border-radius: 8px;
            font-size: 1rem; font-family: inherit; resize: none;
            transition: border-color 0.2s;
        }
        .q-builder textarea:focus { outline: none; border-color: var(--blue); }

        .q-meta { display: flex; gap: 12px; margin: 12px 0; align-items: center; }
        .q-meta select, .q-meta input[type=number] {
            padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
            font-family: inherit; font-size: 0.9rem; background: var(--surface); color: var(--text);
        }
        .q-meta label { font-size: 0.9rem; color: var(--text-muted); }

        /* Opciones Kahoot: colores fijos */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 0; }
        .opt-box {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px; border-radius: 8px; border: none;
        }
        .opt-box:nth-child(1) { background: #e53935; }
        .opt-box:nth-child(2) { background: #1e88e5; }
        .opt-box:nth-child(3) { background: #43a047; }
        .opt-box:nth-child(4) { background: #fb8c00; }
        .opt-box .opt-label {
            color: #fff; font-weight: 700; font-size: 1rem;
            min-width: 22px; text-align: center;
        }
        .opt-box input {
            flex: 1; background: rgba(255,255,255,0.25); border: none; border-bottom: 1.5px solid rgba(255,255,255,0.7);
            color: #fff; font-size: 0.95rem; padding: 4px 6px; font-family: inherit;
        }
        .opt-box input::placeholder { color: rgba(255,255,255,0.7); }
        .opt-box input:focus { outline: none; border-bottom-color: #fff; }

        .btn-launch {
            width: 100%; padding: 14px; background: var(--blue); color: #fff;
            border: none; border-radius: 10px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: background 0.2s, transform 0.1s;
            margin-top: 8px;
        }
        .btn-launch:hover { background: var(--blue-dark); }
        .btn-launch:active { transform: scale(0.98); }
        .btn-launch:disabled { background: #bbb; cursor: not-allowed; }

        /* === PREGUNTA ACTIVA === */
        #active-panel { display: none; }

        .active-header {
            background: linear-gradient(135deg, #1a73e8, #1557b0);
            color: #fff;
            padding: 20px 24px;
            border-radius: var(--radius);
            margin-bottom: 16px;
            position: relative;
        }
        .active-header h2 { font-size: 1.2rem; line-height: 1.4; margin-bottom: 8px; }
        .active-header .timer-ring {
            position: absolute; top: 16px; right: 20px;
            width: 60px; height: 60px;
        }
        .active-header .timer-ring svg { width: 60px; height: 60px; transform: rotate(-90deg); }
        .active-header .timer-ring circle {
            fill: none; stroke: rgba(255,255,255,0.3); stroke-width: 4;
            r: 26; cx: 30; cy: 30;
        }
        .active-header .timer-ring circle.prog {
            stroke: #fff; stroke-dasharray: 163; stroke-dashoffset: 0;
            transition: stroke-dashoffset 1s linear, stroke 0.5s;
        }
        .active-header .timer-text {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
            font-size: 1.1rem; font-weight: 700; color: #fff;
        }

        .progress-bar-wrap { background: #e8eaed; border-radius: 6px; height: 8px; margin-bottom: 12px; overflow: hidden; }
        .progress-bar-fill { height: 100%; background: var(--green); border-radius: 6px; transition: width 0.4s; }

        .answer-count-label { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 12px; }
        .answer-count-label strong { color: var(--text); font-size: 1.1rem; }

        /* Barras de respuestas tipo Kahoot */
        .result-bars { display: grid; gap: 10px; }
        .result-bar-item {
            display: flex; align-items: center; gap: 10px; padding: 10px 14px;
            border-radius: 10px; color: #fff; position: relative; overflow: hidden;
        }
        .result-bar-item:nth-child(1) { background: #e53935; }
        .result-bar-item:nth-child(2) { background: #1e88e5; }
        .result-bar-item:nth-child(3) { background: #43a047; }
        .result-bar-item:nth-child(4) { background: #fb8c00; }
        .result-bar-item .rbi-fill {
            position: absolute; left: 0; top: 0; height: 100%;
            background: rgba(255,255,255,0.2); border-radius: 10px;
            transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
            width: 0%;
        }
        .result-bar-item .rbi-label { font-weight: 700; font-size: 1rem; z-index: 1; min-width: 18px; }
        .result-bar-item .rbi-text { flex: 1; font-size: 0.9rem; z-index: 1; }
        .result-bar-item .rbi-count { font-weight: 700; font-size: 1.1rem; z-index: 1; }

        .btn-close-q {
            width: 100%; padding: 12px; background: var(--red-bg); color: var(--red);
            border: 1.5px solid var(--red); border-radius: 10px;
            font-weight: 700; font-size: 0.95rem; cursor: pointer; margin-top: 16px;
            transition: background 0.2s;
        }
        .btn-close-q:hover { background: #fad6d4; }

        /* === TABLA DE RESPUESTAS === */
        .answers-scroll { max-height: 280px; overflow-y: auto; margin-top: 12px; }
        .answers-scroll table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
        .answers-scroll th { text-align: left; padding: 8px 10px; border-bottom: 2px solid var(--border); color: var(--text-muted); font-weight: 600; position: sticky; top: 0; background: var(--surface); }
        .answers-scroll td { padding: 8px 10px; border-bottom: 1px solid #f0f0f0; }
        .answer-badge {
            display: inline-block; padding: 2px 10px; border-radius: 12px;
            font-weight: 700; color: #fff; font-size: 0.8rem;
        }
        .badge-A { background: #e53935; }
        .badge-B { background: #1e88e5; }
        .badge-C { background: #43a047; }
        .badge-D { background: #fb8c00; }
        .badge-text { background: #7b1fa2; }

        /* === SIDEBAR === */
        .student-list { max-height: 400px; overflow-y: auto; }
        .student-row {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 0; border-bottom: 1px solid #f0f0f0;
        }
        .student-row:last-child { border-bottom: none; }
        .avatar {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 0.85rem; color: #fff; flex-shrink: 0;
        }
        .student-info { flex: 1; min-width: 0; }
        .student-name { font-size: 0.9rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .student-ip { font-size: 0.75rem; color: var(--text-muted); }
        .status-pill {
            padding: 3px 8px; border-radius: 10px; font-size: 0.72rem; font-weight: 700;
            white-space: nowrap; flex-shrink: 0;
        }
        .s-connected { background: var(--green-bg); color: var(--green); }
        .s-disconnected { background: var(--red-bg); color: var(--red); }
        .s-goodbye { background: #f1f3f4; color: var(--text-muted); }

        /* === EVENT LOG === */
        .event-log { max-height: 200px; overflow-y: auto; }
        .evt { padding: 8px 10px; border-radius: 6px; font-size: 0.82rem; margin-bottom: 6px; border-left: 3px solid transparent; }
        .evt-security { background: var(--red-bg); border-left-color: var(--red); }
        .evt-join { background: var(--green-bg); border-left-color: var(--green); }
        .evt-generic { background: #f8f9fa; border-left-color: var(--border); }
        .evt-time { color: var(--text-muted); font-size: 0.75rem; display: block; margin-bottom: 2px; }

        /* === PODIUM (resultados finales) === */
        .podium-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.7); z-index: 200;
            align-items: center; justify-content: center;
        }
        .podium-box {
            background: var(--surface); border-radius: 16px;
            padding: 32px; width: 90%; max-width: 480px; text-align: center;
        }
        .podium-box h2 { font-size: 1.5rem; margin-bottom: 8px; }
        .podium-box .sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; }
        .podium-bars { display: flex; align-items: flex-end; justify-content: center; gap: 16px; height: 150px; margin-bottom: 16px; }
        .pod-bar { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .pod-bar-fill { width: 100%; border-radius: 8px 8px 0 0; transition: height 0.8s cubic-bezier(0.4,0,0.2,1); }
        .pod-1 .pod-bar-fill { background: #fbc02d; }
        .pod-2 .pod-bar-fill { background: #90a4ae; }
        .pod-3 .pod-bar-fill { background: #a1887f; }
        .pod-name { font-size: 0.8rem; font-weight: 600; text-align: center; max-width: 80px; word-break: break-word; }
        .pod-count { font-size: 1rem; font-weight: 700; }
        .btn-dismiss { padding: 10px 28px; background: var(--blue); color: #fff; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 8px; }
        .btn-dismiss:hover { background: var(--blue-dark); }

        /* Scrollbars */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
    </style>
</head>
<body>

<div class="top-bar">
    <h1>SIA · Panel Profesor</h1>
    <div style="display:flex;align-items:center;gap:16px">
        <span style="font-size:0.85rem;color:var(--text-muted)">
            <span class="ws-dot" id="wsDot"></span>
            <span id="wsLabel">Conectando...</span>
        </span>
        <div class="room-badge" id="roomCodeDisplay">---</div>
    </div>
</div>

<div class="main">
    <!-- Columna principal -->
    <div>
        <!-- Builder de preguntas -->
        <div class="card q-builder" id="builder-card">
            <div class="card-title">Nueva Pregunta</div>
            <textarea id="qText" rows="3" placeholder="Escribe tu pregunta aquí..."></textarea>

            <div class="q-meta">
                <label>Tipo:</label>
                <select id="qType" onchange="toggleOpts()">
                    <option value="TEXT">Respuesta libre</option>
                    <option value="MULTIPLE_CHOICE">Opción múltiple</option>
                </select>
                <label>Tiempo (s):</label>
                <input type="number" id="qTime" value="30" min="5" max="120" style="width:70px">
            </div>

            <div id="optsGrid" class="options-grid" style="display:none">
                <div class="opt-box">
                    <span class="opt-label">A</span>
                    <input type="text" id="optA" placeholder="Opción A">
                </div>
                <div class="opt-box">
                    <span class="opt-label">B</span>
                    <input type="text" id="optB" placeholder="Opción B">
                </div>
                <div class="opt-box">
                    <span class="opt-label">C</span>
                    <input type="text" id="optC" placeholder="Opción C">
                </div>
                <div class="opt-box">
                    <span class="opt-label">D</span>
                    <input type="text" id="optD" placeholder="Opción D">
                </div>
            </div>

            <div id="correctOptSection" style="display:none; margin-top: 12px;">
                <label style="font-size: 0.9rem; color: var(--text-muted); display: block; margin-bottom: 8px;">Respuesta correcta:</label>
                <div style="display: flex; gap: 10px; justify-content: center;">
                    <label class="correct-radio" style="background:#e53935"><input type="radio" name="correctOpt" value="A"> A</label>
                    <label class="correct-radio" style="background:#1e88e5"><input type="radio" name="correctOpt" value="B"> B</label>
                    <label class="correct-radio" style="background:#43a047"><input type="radio" name="correctOpt" value="C"> C</label>
                    <label class="correct-radio" style="background:#fb8c00"><input type="radio" name="correctOpt" value="D"> D</label>
                </div>
            </div>

            <style>
                .correct-radio {
                    padding: 8px 16px; border-radius: 8px; color: #fff; font-weight: 700; cursor: pointer;
                    border: 3px solid transparent; transition: border-color 0.2s;
                }
                .correct-radio input { display: none; }
                .correct-radio:has(input:checked) { border-color: #fff; outline: 3px solid var(--blue); }
            </style>

            <button class="btn-launch" id="btnLaunch" onclick="launchQuestion()">🚀 Lanzar Pregunta</button>
        </div>

        <!-- Panel de pregunta activa -->
        <div id="active-panel">
            <div class="active-header" id="activeHeader">
                <h2 id="activeQText">Pregunta...</h2>
                <div class="timer-ring">
                    <svg viewBox="0 0 60 60">
                        <circle r="26" cx="30" cy="30"/>
                        <circle class="prog" id="timerCircle" r="26" cx="30" cy="30"/>
                    </svg>
                    <div class="timer-text" id="timerText">--</div>
                </div>
            </div>

            <div class="card" style="margin-bottom:16px">
                <div class="answer-count-label">
                    Respondieron: <strong id="ansCount">0</strong> de <strong id="totalStudents">0</strong>
                </div>
                <div class="progress-bar-wrap">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="result-bars" id="resultBars"></div>

                <div class="answers-scroll">
                    <table>
                        <thead><tr><th>Estudiante</th><th>Respuesta</th><th>Hora</th></tr></thead>
                        <tbody id="answersTable"></tbody>
                    </table>
                </div>

                <button class="btn-close-q" onclick="closeQuestion()">⏹ Cerrar Pregunta</button>
            </div>
        </div>
    </div>

    <!-- Sidebar -->
    <div>
        <div class="card" style="margin-bottom:16px">
            <div class="card-title">Estudiantes (<span id="studentCount">0</span>)</div>
            <div class="student-list" id="studentList"></div>
        </div>

        <div class="card">
            <div class="card-title">Eventos</div>
            <div class="event-log" id="eventLog">
                <p style="color:var(--text-muted);font-size:0.85rem;text-align:center">Sin eventos</p>
            </div>
        </div>
    </div>
</div>

<!-- Podium overlay (resultados finales) -->
<div class="podium-overlay" id="podiumOverlay">
    <div class="podium-box">
        <h2>🏆 Pregunta cerrada</h2>
        <p class="sub" id="podiumSub"></p>
        <div class="podium-bars" id="podiumBars"></div>
        <button class="btn-dismiss" onclick="document.getElementById('podiumOverlay').style.display='none'">Nueva pregunta</button>
    </div>
</div>

<script>
const AVATAR_COLORS = ['#e53935','#1e88e5','#43a047','#fb8c00','#7b1fa2','#00838f','#c62828','#2e7d32'];

let ws, roomCode = '', activeQuestion = null, timerInterval = null;
let students = new Map(), answerCounts = {};

// ---- WebSocket ----
function connect() {
    ws = new WebSocket('ws://' + location.hostname + ':8081/ws-admin');
    ws.onopen = () => { setWsStatus(true); };
    ws.onclose = () => { setWsStatus(false); setTimeout(connect, 2000); };
    ws.onmessage = (e) => {
        const d = JSON.parse(e.data);
        if (d.type === 'init') {
            roomCode = d.room;
            document.getElementById('roomCodeDisplay').textContent = d.room;
            (d.students || []).forEach(s => upsertStudent(s));
            checkActiveQuestion();
        } else if (d.type === 'question_broadcast') {
            onQuestionActive(d.question);
        } else if (d.type === 'new_answer') {
            onNewAnswer(d);
        } else if (d.type === 'question_closed') {
            onQuestionClosed(d);
        } else if (d.client_id) {
            upsertStudent(d);
            if (d.event === 'security') logEvent(d, 'security');
            else if (d.event === 'heartbeat') { /* silencioso */ }
            else logEvent(d, 'generic');
        }
    };
}
function setWsStatus(ok) {
    document.getElementById('wsDot').className = 'ws-dot' + (ok ? ' connected' : '');
    document.getElementById('wsLabel').textContent = ok ? 'Conectado' : 'Reconectando...';
}

// ---- Estudiantes ----
function upsertStudent(s) {
    const prev = students.get(s.client_id) || {};
    students.set(s.client_id, {...prev, ...s});
    if (!prev.client_id) logEvent({...s, event:'join'}, 'join');
    renderStudents();
}
function renderStudents() {
    const list = document.getElementById('studentList');
    document.getElementById('studentCount').textContent = students.size;
    document.getElementById('totalStudents').textContent = students.size;
    list.innerHTML = '';
    let i = 0;
    students.forEach(s => {
        const color = AVATAR_COLORS[i++ % AVATAR_COLORS.length];
        const initials = (s.student_name || '?').split(' ').map(w=>w[0]).join('').substring(0,2).toUpperCase();
        const statusClass = s.status === 'connected' ? 's-connected' : s.status === 'goodbye' ? 's-goodbye' : 's-disconnected';
        const statusLabel = s.status === 'connected' ? 'En línea' : s.status === 'goodbye' ? 'Salió' : 'Desconectado';
        const row = document.createElement('div');
        row.className = 'student-row';
        row.innerHTML = `
            <div class="avatar" style="background:${color}">${initials}</div>
            <div class="student-info">
                <div class="student-name">${s.student_name || 'Desconocido'}</div>
                <div class="student-ip">${s.local_ip || s.LocalIP || '---'}</div>
            </div>
            <span class="status-pill ${statusClass}">${statusLabel}</span>
        `;
        list.appendChild(row);
    });
}

// ---- Event Log ----
function logEvent(d, type) {
    const log = document.getElementById('eventLog');
    const p = log.querySelector('p');
    if (p) log.innerHTML = '';
    const student = students.get(d.client_id);
    const name = student ? student.student_name : (d.client_id || '').substring(0,8)+'...';
    const time = new Date().toLocaleTimeString();
    const cls = type === 'security' ? 'evt-security' : type === 'join' ? 'evt-join' : 'evt-generic';
    const msg = type === 'security' ? `🚨 ${name} perdió el foco` : type === 'join' ? `✅ ${name} se unió` : `${name}: ${d.status || d.event || ''}`;
    const div = document.createElement('div');
    div.className = 'evt ' + cls;
    div.innerHTML = `<span class="evt-time">${time}</span>${msg}`;
    log.prepend(div);
}

// ---- Builder ----
function toggleOpts() {
    const isMulti = document.getElementById('qType').value === 'MULTIPLE_CHOICE';
    document.getElementById('optsGrid').style.display = isMulti ? 'grid' : 'none';
    document.getElementById('correctOptSection').style.display = isMulti ? 'block' : 'none';
}

async function generateHMAC(message, key) {
    const enc = new TextEncoder();
    const k = await crypto.subtle.importKey('raw', enc.encode(key.toUpperCase()), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
    const sig = await crypto.subtle.sign('HMAC', k, enc.encode(message));
    return Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function launchQuestion() {
    const text = document.getElementById('qText').value.trim();
    if (!text) { alert('Escribe una pregunta'); return; }
    const type = document.getElementById('qType').value;
    const timer = parseInt(document.getElementById('qTime').value) || 30;
    const qid = Date.now().toString(36) + Math.random().toString(36).substr(2,4);
    const rc = roomCode.toUpperCase();

    const options = [];
    let correctOption = "";
    if (type === 'MULTIPLE_CHOICE') {
        ['A','B','C','D'].forEach(id => {
            const t = document.getElementById('opt'+id).value.trim();
            if (t) options.push({id, text: t});
        });
        if (options.length < 2) { alert('Agrega al menos 2 opciones'); return; }
        
        const selected = document.querySelector('input[name="correctOpt"]:checked');
        if (!selected) { alert('Selecciona la respuesta correcta'); return; }
        correctOption = selected.value;
    }

    const sig = await generateHMAC(qid + rc, rc);
    const payload = {
        room_code: rc,
        admin_signature: sig,
        question: {
            question_id: qid, room_code: rc, text, options,
            type: type === 'TEXT' ? 0 : 1,
            created_at: Math.floor(Date.now()/1000),
            correct_option: correctOption
        }
    };

    document.getElementById('btnLaunch').disabled = true;
    const res = await fetch('/api/question/broadcast', {
        method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
    });
    const result = await res.json();
    if (!result.success) {
        alert('Error: ' + (result.message || 'Hay una pregunta activa'));
        document.getElementById('btnLaunch').disabled = false;
    } else {
        startTimer(timer, qid);
    }
}

// ---- Pregunta activa ----
function onQuestionActive(q) {
    activeQuestion = q;
    answerCounts = {};
    document.getElementById('builder-card').style.display = 'none';
    document.getElementById('active-panel').style.display = 'block';
    document.getElementById('activeQText').textContent = q.text || q.Text;
    document.getElementById('ansCount').textContent = '0';
    document.getElementById('progressFill').style.width = '0%';
    document.getElementById('answersTable').innerHTML = '';
    renderResultBars(q.options || q.Options || []);
}

function renderResultBars(options) {
    const container = document.getElementById('resultBars');
    if (!options || options.length === 0) { container.innerHTML = ''; return; }
    container.innerHTML = options.map((o, i) => `
        <div class="result-bar-item" id="bar-${o.id || o.ID || i}">
            <div class="rbi-fill" id="fill-${o.id || o.ID || i}"></div>
            <span class="rbi-label" id="label-${o.id || o.ID || i}">${o.id || o.ID || String.fromCharCode(65+i)}</span>
            <span class="rbi-text">${o.text || o.Text || ''}</span>
            <span class="rbi-count" id="cnt-${o.id || o.ID || i}">0</span>
        </div>
    `).join('');
}

function onNewAnswer(d) {
    if (!activeQuestion) return;
    const table = document.getElementById('answersTable');
    const answer = d.answer || d.Answer || '';
    const name = d.student_name || d.StudentName || 'Desconocido';
    const time = new Date().toLocaleTimeString();
    const badgeClass = ['A','B','C','D'].includes(answer) ? 'badge-'+answer : 'badge-text';
    const tr = document.createElement('tr');
    tr.innerHTML = `<td>${name}</td><td><span class="answer-badge ${badgeClass}">${answer}</span></td><td>${time}</td>`;
    table.prepend(tr);

    // Contar
    answerCounts[answer] = (answerCounts[answer] || 0) + 1;
    const total = Object.values(answerCounts).reduce((a,b)=>a+b,0);
    document.getElementById('ansCount').textContent = total;
    const pct = students.size > 0 ? Math.round(total/students.size*100) : 0;
    document.getElementById('progressFill').style.width = pct + '%';

    // Actualizar barras
    const opts = activeQuestion.options || activeQuestion.Options || [];
    const maxCount = Math.max(...Object.values(answerCounts), 1);
    opts.forEach((o, i) => {
        const id = o.id || o.ID || String.fromCharCode(65+i);
        const cnt = answerCounts[id] || 0;
        const fillEl = document.getElementById('fill-'+id);
        const cntEl = document.getElementById('cnt-'+id);
        if (fillEl) fillEl.style.width = Math.round(cnt/maxCount*100)+'%';
        if (cntEl) cntEl.textContent = cnt;
    });
}

function onQuestionClosed(d) {
    clearTimer();
    const total = Object.values(answerCounts).reduce((a,b)=>a+b,0);
    
    // Resaltar respuesta correcta
    if (d.correct_option) {
        document.querySelectorAll('.result-bar-item').forEach(bar => {
            if (bar.id === 'bar-' + d.correct_option) {
                bar.style.outline = '4px solid #fff';
                bar.style.zIndex = '10';
                const label = document.getElementById('label-' + d.correct_option);
                if (label) label.textContent = '✓ ' + label.textContent;
            } else {
                bar.style.opacity = '0.4';
            }
        });
    }

    showPodium(total, d.correct_option);
    setTimeout(() => {
        activeQuestion = null;
        document.getElementById('active-panel').style.display = 'none';
        document.getElementById('builder-card').style.display = 'block';
        document.getElementById('btnLaunch').disabled = false;
        document.getElementById('qText').value = '';
        // Reset radios
        document.querySelectorAll('input[name="correctOpt"]').forEach(r => r.checked = false);
    }, 4500); // Un poco más de tiempo para ver el resalte
}

async function closeQuestion() {
    if (!activeQuestion) return;
    const qid = activeQuestion.question_id || activeQuestion.QuestionID;
    await fetch('/api/question/close', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({question_id: qid, room_code: roomCode})
    });
}

// ---- Timer ----
function startTimer(seconds, qid) {
    const circle = document.getElementById('timerCircle');
    const label = document.getElementById('timerText');
    const circumference = 2 * Math.PI * 26; // 163.36
    let remaining = seconds;
    circle.style.strokeDasharray = circumference;
    label.textContent = remaining;

    timerInterval = setInterval(() => {
        remaining--;
        label.textContent = remaining;
        const offset = circumference * (1 - remaining / seconds);
        circle.style.strokeDashoffset = offset;
        if (remaining <= 5) circle.style.stroke = '#e53935';
        else circle.style.stroke = '#fff';
        if (remaining <= 0) {
            clearTimer();
            closeQuestion();
        }
    }, 1000);
}
function clearTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

// ---- Podium ----
function showPodium(total, correctOption) {
    const opts = activeQuestion ? (activeQuestion.options || activeQuestion.Options || []) : [];
    const maxCount = Math.max(...Object.values(answerCounts), 1);
    document.getElementById('podiumSub').textContent = `Total respuestas: ${total} de ${students.size} estudiantes`;

    if (opts.length > 0) {
        const sorted = opts.map((o,i) => {
            const id = o.id || o.ID || String.fromCharCode(65+i);
            return {id, text: o.text || o.Text || id, count: answerCounts[id]||0};
        }).sort((a,b)=>b.count-a.count).slice(0,3);

        const bars = document.getElementById('podiumBars');
        const order = sorted.length >= 3 ? [sorted[1], sorted[0], sorted[2]] : sorted;
        const heights = [90, 140, 70];
        bars.innerHTML = order.map((item, i) => `
            <div class="pod-bar pod-${i+1}">
                <div class="pod-count">${item.count}</div>
                <div class="pod-bar-fill" style="height:${heights[i]}px"></div>
                <div class="pod-name">${item.id}: ${item.text}</div>
            </div>
        `).join('');
    } else {
        document.getElementById('podiumBars').innerHTML = `<p style="color:var(--text-muted);width:100%;text-align:center">${total} respuestas de texto recibidas</p>`;
    }

    document.getElementById('podiumOverlay').style.display = 'flex';
}

// ---- Cargar pregunta activa al reconectar ----
async function checkActiveQuestion() {
    try {
        const res = await fetch('/api/question/active');
        const q = await res.json();
        if (q && q.open) {
            onQuestionActive(q);
            const results = await fetch('/api/question/results/' + q.question_id);
            const answers = await results.json();
            if (answers) answers.forEach(a => onNewAnswer({
                student_name: a.student_name, answer: a.answer
            }));
        }
    } catch(e) {}
}

connect();
